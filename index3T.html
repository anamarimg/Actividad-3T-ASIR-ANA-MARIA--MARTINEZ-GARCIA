<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <title>Document3T</title>
  </head>
  <body class="container">
    <h1 class="text-center mt-4">Sistema de Gestión de Trabajadores</h1>

    <div class="row mt-4">
      <!-- la suma de todas las columnas tiene que ser 12 , aquí pide 60 y 40% (que será col-7 y col-5)-->
      <div class="col-7 bg-primary-subtle text-primary-emphasis p-4">
        <h2 class="text-center mb-4">Añadir Trabajador</h2>
        <input
          id="nombre"
          placeholder="Introduce tu nombre"
          type="text"
          class="form-control mb-3"
        />
        <input
          id="apellido"
          placeholder="Introduce tu apellido"
          type="text"
          class="form-control mb-3"
        />
        <input
          id="correo"
          placeholder="Introduce tu correo"
          type="email"
          class="form-control mb-3"
        />

        <select id="departamento" class="form-select mb-3">
          <option value="IT">IT</option>
          <option value="Marketing">Marketing</option>
          <option value="Ventas">Ventas</option>
          <option value="Administracion">Administración</option>
        </select>

        <button id="btnGuardarDatos" class="btn btn-primary w-100">Guardar Datos
        </button>

      </div>

      <div class="col-5 bg-secondary text-white p-4 rounded border">
        <h2 class="text-center">Lista de Trabajadores</h2>
        <ul id="ListadeTrabajadores" class="list-group"></ul>
      </div>
    

    <div class="row mt-4 p-4 bg-info text-white rounded">
      <h3 class="text-center">Resumen por Departamento</h3>
      <div class=""d-flex justify-content-around mt-3">
        <p>IT: <span id="contIT">0</span></p>
        <p>Marketing: <span id="contMarket">0</span></p>
        <p>Ventas: <span id="contVent">0</span></p>
        <p>Administración: <span id="contAdmin">0</span></p>
      </div>
    </div>
    <script src="fichero3T.js"></script>
  </body>
</html>
